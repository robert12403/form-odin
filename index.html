<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms project</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="container">
        <div id="photoLogoImage">
            <img src="forest.jpg" alt="forest" id="imgForest">
            <div id="logoImage">
                <div id="logo">
                    <img src="odinn-logo.png" alt="logo" id="imgLogo">
                </div>
                <div id="image-text">ODIN</div>
            </div>
        </div>
        <div id="formPart">
            <div id="form-top">
                <div id="top-form-text">
                    <p>This is a <em>fake</em> online service for my sample project. Lorem ipsum dolor sit, amet
                        consectetur adipisicing elit. Still, you should sign up to it,
                        because it is
                        very good and important.</p>
                    <p>You should <em>sign up now</em>.</p>
                    <p id="last">Let's do this!</p>
                </div>
                <form action="example.com/path">
                    <div class="row">
                        <div class="pair">
                            <label for="first_name" class="labels">FIRST NAME</label>
                            <input type="text" id="first_name">
                        </div>

                        <div class="pair">
                            <label for="last_name" class="labels">LAST NAME</label>
                            <input type="text" id="last_name">
                        </div>
                    </div>

                    <div class="row">
                        <div class="pair">
                            <label for="email" class="labels">EMAIL</label>
                            <input type="email" id="email">
                        </div>

                        <div class="pair">
                            <label for="phone" class="labels">PHONE NUMBER</label>
                            <input type="tel" id="phone">
                        </div>
                    </div>

                    <div class="row">
                        <div class="pair">
                            <label for="password" class="labels">PASSWORD</label>
                            <input type="password" id="password">
                        </div>

                        <div class="pair">
                            <label for="passwordC" class="labels">CONFIRM PASSWORD</label>
                            <input type="password" id="passwordC">
                        </div>
                    </div>
                </form>
            </div>
            <div id="form-bottom">
                <button>Create Account</button>
                <div id="last-text">
                    <div>Already have an account?</div>
                    <div id="login">Log in</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
